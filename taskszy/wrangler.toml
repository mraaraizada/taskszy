# Cloudflare Pages Configuration for Taskszy
name = "taskszy"
compatibility_date = "2024-01-01"

# Pages configuration
pages_build_output_dir = "deploy"

# Custom domains
[[pages_custom_domains]]
domain = "taskszy.com"

# Environment variables (add these in Cloudflare Dashboard for security)
# VITE_FIREBASE_API_KEY
# VITE_FIREBASE_AUTH_DOMAIN
# VITE_FIREBASE_PROJECT_ID
# etc.

[build]
command = "npm run build:cloudflare"
cwd = "."

[build.upload]
format = "directory"
dir = "./deploy"

# Routing rules are handled by _redirects file
# /app/* -> serves app SPA
# /adminzdashboard/* -> serves admin SPA  
# /* -> serves main website

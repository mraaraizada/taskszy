<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/app/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TasksZy I Organize Better, Scale Faster</title>
    
    <!-- Fix for spreadsheet text visibility -->
    <style>
      /* Basic spreadsheet styling */
      .x-spreadsheet {
        background: #fff;
      }
      
      .x-spreadsheet-table {
        background: #fff;
      }
      
      /* AGGRESSIVE FIX: Hide broken icons and show text labels instead */
      .x-spreadsheet-icon .x-spreadsheet-icon-img {
        display: none !important;
      }
      
      /* Make toolbar buttons visible with text */
      .x-spreadsheet-toolbar-btn {
        background: #ffffff !important;
        border: 1px solid #d0d0d0 !important;
        border-radius: 4px !important;
        padding: 4px 8px !important;
        min-width: 32px !important;
        min-height: 28px !important;
        cursor: pointer !important;
        position: relative !important;
      }
      
      .x-spreadsheet-toolbar-btn:hover {
        background: #f0f0f0 !important;
        border-color: #3B5BFC !important;
      }
      
      .x-spreadsheet-toolbar-btn:active,
      .x-spreadsheet-toolbar-btn.active {
        background: #e0e0e0 !important;
      }
      
      /* Add text labels for common toolbar buttons */
      .x-spreadsheet-toolbar-btn:nth-child(1):after { content: "↶"; font-size: 16px; }
      .x-spreadsheet-toolbar-btn:nth-child(2):after { content: "↷"; font-size: 16px; }
      .x-spreadsheet-toolbar-btn:nth-child(3):after { content: "🖨"; font-size: 14px; }
      .x-spreadsheet-toolbar-btn:nth-child(4):after { content: "🖌"; font-size: 14px; }
      .x-spreadsheet-toolbar-btn:nth-child(5):after { content: "B"; font-weight: bold; font-size: 14px; }
      .x-spreadsheet-toolbar-btn:nth-child(6):after { content: "I"; font-style: italic; font-size: 14px; }
      .x-spreadsheet-toolbar-btn:nth-child(7):after { content: "U"; text-decoration: underline; font-size: 14px; }
      
      /* Ensure toolbar is visible */
      .x-spreadsheet-toolbar {
        background: #f8f9fa !important;
        border-bottom: 1px solid #e0e2e4 !important;
        padding: 6px 12px !important;
        min-height: 40px !important;
      }
      
      .x-spreadsheet-toolbar-btns {
        display: flex !important;
        gap: 4px !important;
        flex-wrap: wrap !important;
      }
      
      /* Dropdown menus */
      .x-spreadsheet-dropdown {
        background: #ffffff !important;
        border: 1px solid #d0d0d0 !important;
        border-radius: 4px !important;
        padding: 4px 8px !important;
        cursor: pointer !important;
      }
      
      .x-spreadsheet-dropdown-title {
        color: #333333 !important;
        font-size: 13px !important;
      }
    </style>
    
    <!-- Aggressive console suppression for third-party scripts -->
    <script>
      (function() {
        // Store original console methods
        const _warn = console.warn;
        const _error = console.error;
        const _log = console.log;
        const _info = console.info;
        
        // List of patterns to suppress
        const suppressPatterns = [
          'Permissions policy',
          'devicemotion',
          'deviceorientation',
          'Mixed Content',
          'Refused to get unsafe header',
          'x-rtb-fingerprint-id',
          'request-id',
          'accelerometer is not allowed',
          'Violation',
          'local network request',
          'preloaded using link preload',
          'not used within a few seconds'
        ];
        
        // Helper to check if message should be suppressed
        function shouldSuppress(args) {
          const message = String(args[0] || '');
          return suppressPatterns.some(pattern => message.toLowerCase().includes(pattern.toLowerCase()));
        }
        
        // Override all console methods
        console.warn = function(...args) {
          if (!shouldSuppress(args)) _warn.apply(console, args);
        };
        
        console.error = function(...args) {
          if (!shouldSuppress(args)) _error.apply(console, args);
        };
        
        console.log = function(...args) {
          if (!shouldSuppress(args)) _log.apply(console, args);
        };
        
        console.info = function(...args) {
          if (!shouldSuppress(args)) _info.apply(console, args);
        };
        
        // Intercept window.onerror for global errors
        const _onerror = window.onerror;
        window.onerror = function(message, source, lineno, colno, error) {
          const msg = String(message || '');
          if (shouldSuppress([msg])) return true;
          if (_onerror) return _onerror.apply(window, arguments);
          return false;
        };
        
        // Prevent any script from restoring original console
        try {
          Object.defineProperty(window, 'console', {
            value: console,
            writable: false,
            configurable: false
          });
        } catch (e) {
          // Ignore if already defined
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
